# Nginx reverse proxy for Danfoss RAG Chatbot
# Place this file at: /etc/nginx/sites-available/rag.srv844085.hstgr.cloud
# Then symlink: ln -s /etc/nginx/sites-available/rag.srv844085.hstgr.cloud /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name rag.srv844085.hstgr.cloud;

    # Redirect HTTP to HTTPS (uncomment after certbot runs)
    # return 301 https://$host$request_uri;

    # Proxy to Docker container
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long RAG queries
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # File upload size limit (for nameplate images + document ingestion)
    client_max_body_size 50M;
}

